name: E2E nightly

# The slow real-server matrix (L4): downloads real provider jars and boots them
# with a real JVM. Runs on a schedule and on demand — never blocks normal PRs.
on:
   schedule:
      # 07:00 UTC daily.
      - cron: '0 7 * * *'
   workflow_dispatch:

concurrency:
   group: e2e-nightly
   cancel-in-progress: true

jobs:
   e2e:
      name: Real-server matrix
      runs-on: windows-latest
      # A full boot matrix can take a while; cap it generously.
      timeout-minutes: 45

      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: npm

         - name: Setup Rust
           uses: dtolnay/rust-toolchain@stable

         - name: Cache Rust build
           uses: Swatinem/rust-cache@v2
           with:
              workspaces: src-tauri

         # The L4 harness reads JAVA_HOME to find the JVM that boots the servers.
         - name: Setup Java (Temurin 21)
           uses: actions/setup-java@v4
           with:
              distribution: temurin
              java-version: 21

         - name: Install frontend dependencies
           run: npm ci

         # tauri-build reads the frontend dist during the backend build.
         - name: Build frontend (for tauri-build)
           run: npm run build

         - name: Run real-server E2E matrix
           working-directory: src-tauri
           run: cargo test --test e2e -- --ignored --nocapture
