name: CI

on:
   pull_request:
   push:
      branches:
         - main

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
   group: ci-${{ github.ref }}
   cancel-in-progress: true

jobs:
   fast:
      name: Fast checks (build, typecheck, unit + integration tests)
      runs-on: windows-latest

      steps:
         - name: Checkout
           uses: actions/checkout@v4

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 20
              cache: npm

         - name: Setup Rust
           uses: dtolnay/rust-toolchain@stable
           with:
              components: rustfmt, clippy

         - name: Cache Rust build
           uses: Swatinem/rust-cache@v2
           with:
              workspaces: src-tauri

         - name: Install frontend dependencies
           run: npm ci

         - name: Frontend typecheck + build
           run: npm run build

         - name: Frontend tests (Vitest)
           run: npm run test:run

         - name: Rust format check
           working-directory: src-tauri
           run: cargo fmt --check

         # Clippy runs as a report, not a hard gate: the existing codebase has
         # pre-existing style warnings. Tighten to `-- -D warnings` once those are
         # cleared so new lints fail the build.
         - name: Rust lint (clippy, non-blocking)
           working-directory: src-tauri
           run: cargo clippy --all-targets
           continue-on-error: true

         - name: Rust unit + integration tests (L1 + L3)
           working-directory: src-tauri
           run: cargo test
